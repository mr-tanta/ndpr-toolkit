              - generic [ref=e248]:
                - heading "NDPA Section 40 — Notification of Personal Data Breach" [level=3] [ref=e249]
                - paragraph [ref=e250]:
                  - text: Under the Nigeria Data Protection Act, data controllers are required to notify the Nigeria Data Protection Commission (NDPC) of a personal data breach within
                  - strong [ref=e251]: 72 hours
                  - text: "of becoming aware of it. The notification must include:"
                - list [ref=e252]:
                  - listitem [ref=e253]: The nature of the personal data breach including categories and approximate number of data subjects affected
                  - listitem [ref=e254]: The name and contact details of the Data Protection Officer or other contact point
                  - listitem [ref=e255]: A description of the likely consequences of the breach
                  - listitem [ref=e256]: A description of the measures taken or proposed to address the breach and mitigate its effects
                - paragraph [ref=e257]: Where the breach is likely to result in a high risk to the rights and freedoms of data subjects, the controller must also communicate the breach to the affected data subjects without undue delay.
