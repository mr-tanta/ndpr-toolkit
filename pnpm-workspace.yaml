# pnpm settings live here (not .npmrc) so they're honored consistently across
# pnpm 10 and 11 — pnpm 11 ignores these keys in .npmrc, which previously left
# the lockfile's autoInstallPeers out of sync with CI and broke --frozen-lockfile.
autoInstallPeers: true

# These security overrides are INTENTIONALLY duplicated in package.json
# pnpm.overrides — keep both blocks identical when adding/changing an entry:
# - pnpm 10 has an open lockfile bug (pnpm/pnpm#10614) that strips overrides
#   defined only here from pnpm-lock.yaml on install; the package.json copy is
#   what keeps them pinned. Don't delete it until that bug is fixed for the
#   pnpm version pinned in package.json#packageManager.
# - pnpm 11 silently ignores package.json pnpm.overrides (pnpm/pnpm#11536),
#   so this block is what pnpm 11 actually reads.
overrides:
  handlebars: '>=4.7.9'
  lodash: '>=4.17.21'
  # ^ not >= — test-exclude (jest coverage) does promisify(glob), which breaks on glob 9+
  glob: '^7.2.3'
  tar: '>=7.5.10'
  js-yaml: '>=4.2.0'
  yaml: '>=2.8.3'
  picomatch: '>=2.3.2'
  flatted: '>=3.4.2'
  dompurify: '>=3.4.11'
  esbuild: '>=0.28.1'
  brace-expansion: '>=5.0.6'
  fast-xml-parser: '>=5.7.0'
  '@protobufjs/utf8': '>=1.1.1'
  fast-uri: '>=3.1.1'
  postcss: '>=8.5.10'
  ws: '>=8.20.1'
  fast-xml-builder: '>=1.1.7'
