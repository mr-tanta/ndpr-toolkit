# Build and deploy the docs site (Next.js → GitHub Pages).
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      # On PRs we only build to type-check the docs app; don't deploy.
      - "src/**"
      - "next.config.*"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  workflow_dispatch:

# Workflow-level permissions are the union of what `build` needs.
# `id-token: write` is moved to the `deploy` job (3.10.6) so a malicious
# dep in the build step can't exfiltrate an OIDC token.
permissions:
  contents: read
  pages: write

# Allow only one concurrent deployment.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            .next/cache
          # Keyed on lockfile only (3.10.6) — the source-files hash made the
          # key change on every commit, defeating most of the .next/cache value.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Install dependencies
        # --frozen-lockfile: match CI's contract.
        run: pnpm install --frozen-lockfile
      - name: Build library first
        run: pnpm run build:lib
      - name: Typecheck docs site (PRs only)
        # The Next.js build below skips TS for speed; this step runs a real
        # tsc pass on PR builds so docs-site type errors surface at review
        # time (closes the docs typecheck gap from the 20-agent audit).
        if: github.event_name == 'pull_request'
        run: npx tsc --noEmit -p tsconfig.json
      - name: Build with Next.js
        run: pnpm build
        env:
          SKIP_TYPE_CHECK: true
          NEXT_SKIP_TYPE_CHECK: true
          USE_CUSTOM_DOMAIN: true
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_GSC_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GSC_VERIFICATION }}
      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./out

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    # Deploy is the only step that actually needs the OIDC token.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
