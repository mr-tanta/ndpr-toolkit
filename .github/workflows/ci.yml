name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile (3.10.6): CI must build from the locked deps so a
        # PR with a package.json change that isn't reflected in pnpm-lock.yaml
        # fails fast instead of silently drifting.
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: |
          pnpm test -- \
            --coverage \
            --coverageReporters=text-summary \
            --coverageReporters=lcov \
            --collectCoverageFrom='packages/ndpr-toolkit/src/**/*.ts' \
            --collectCoverageFrom='packages/ndpr-toolkit/src/**/*.tsx' \
            --collectCoverageFrom='!packages/ndpr-toolkit/src/**/*.d.ts' \
            --collectCoverageFrom='!packages/ndpr-toolkit/src/__tests__/**'

      - name: Upload coverage report
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build library
        run: pnpm build:lib

      - name: Verify entry points
        # Entry list synced (3.10.6) with publish.yml — both check 22 entries.
        run: |
          for entry in index core server hooks headless adapters presets consent dsr dpia breach policy lawful-basis cross-border ropa lawful-basis-lite cross-border-lite ropa-lite unstyled presets-consent presets-dsr presets-policy; do
            for ext in js mjs d.ts; do
              if [ ! -f "dist/$entry.$ext" ]; then
                echo "MISSING: dist/$entry.$ext"
                exit 1
              fi
            done
          done
          if [ ! -f "dist/styles.css" ]; then
            echo "MISSING: dist/styles.css"
            exit 1
          fi
          echo "All 22 entry points + styles.css verified (js + mjs + d.ts)"

      - name: Verify tarball — every subpath resolves (ESM + CJS + TS)
        # Same gate that runs in publish.yml right before `npm publish`.
        # Running it on PRs catches broken exports at review time.
        run: pnpm verify:tarball --skip-build
