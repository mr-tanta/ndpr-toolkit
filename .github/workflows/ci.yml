name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        # `matrix.node-version` is defined inside this workflow (the strategy
        # matrix above), so it's not user-controlled input. Used only here.
        run: pnpm --filter @tantainnovative/ndpr-toolkit test -- --coverage --coverageReporters=text-summary --coverageReporters=lcov

      - name: Upload coverage report
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/ndpr-toolkit/coverage/
          retention-days: 14

      - name: Build library
        run: pnpm build:lib

      - name: Verify entry points
        run: |
          for entry in index core hooks adapters presets consent dsr dpia breach policy lawful-basis cross-border ropa unstyled; do
            for ext in js mjs d.ts; do
              if [ ! -f "dist/$entry.$ext" ]; then
                echo "MISSING: dist/$entry.$ext"
                exit 1
              fi
            done
          done
          echo "All 14 entry points verified (js + mjs + d.ts)"
