name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build library
        run: pnpm build:lib

      - name: Verify entry points
        run: |
          for entry in index core server hooks adapters presets consent dsr dpia breach policy lawful-basis cross-border ropa unstyled; do
            for ext in js mjs d.ts; do
              if [ ! -f "dist/$entry.$ext" ]; then
                echo "MISSING: dist/$entry.$ext"
                exit 1
              fi
            done
          done
          if [ ! -f "dist/styles.css" ]; then
            echo "MISSING: dist/styles.css"
            exit 1
          fi
          echo "All 15 entry points + styles.css verified"

      - name: Verify package version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, release tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
