name: Publish to npm

on:
  release:
    types: [published]
  # Manual trigger. By default this is a no-publish smoke test of the
  # build/verify pipeline — the MAIN-library publish is always gated to real
  # release events, so a dispatch can never push the flagship package.
  #
  # Set `publish_companions: true` to publish the companion packages
  # (create-ndpr, ndpr-recipes, unscoped alias) at their current versions via
  # the same Trusted Publishing path — useful for shipping a companion bump
  # without cutting a main-library release. Still idempotent: versions already
  # on npm are skipped.
  workflow_dispatch:
    inputs:
      publish_companions:
        description: 'Publish companion packages at their current versions'
        type: boolean
        default: false

# Block concurrent publishes — if two releases are tagged seconds apart,
# only one runs at a time to prevent racing for the npm version.
concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      # Pin checkout to the release tag so we build & publish the exact
      # tagged tree, not whatever happens to be on the default branch.
      # `release.tag_name` is a Git refname which cannot contain shell
      # metacharacters and is only consumed by actions/checkout as a ref
      # parameter — not interpolated into any shell command.
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a version that supports Trusted Publishing OIDC
        # Node 22 ships with npm 10.x; npm Trusted Publishing (the GitHub
        # OIDC → npm token exchange) requires npm 11.5.1 or later.
        #
        # Pinned to npm@11 (3.10.6) instead of npm@latest — a future major
        # npm release could break publish on the day it lands. Bump this
        # pin deliberately.
        run: npm install -g npm@11

      - name: Install dependencies
        # --frozen-lockfile: build the published tarball from the exact locked
        # deps. pnpm settings now live in pnpm-workspace.yaml (overrides +
        # autoInstallPeers), so the lockfile stays in sync across pnpm 10/11
        # and a frozen install can't silently drift into a published build.
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build library
        run: pnpm build:lib

      - name: Verify entry points
        run: |
          for entry in index core server hooks headless adapters presets consent dsr dpia breach policy lawful-basis cross-border ropa lawful-basis-lite cross-border-lite ropa-lite unstyled presets-consent presets-dsr presets-policy; do
            for ext in js mjs d.ts; do
              if [ ! -f "dist/$entry.$ext" ]; then
                echo "MISSING: dist/$entry.$ext"
                exit 1
              fi
            done
          done
          if [ ! -f "dist/styles.css" ]; then
            echo "MISSING: dist/styles.css"
            exit 1
          fi
          echo "All 22 entry points + styles.css verified"

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, release tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      # Tarball-level integration test: build a packed tarball, install it
      # into a fresh sandbox, then resolve every documented subpath via
      # ESM import, CJS require, /styles asset path, and TypeScript tsc.
      # Closes the gap that let 3.8.0 through 3.10.2 silently ship with
      # missing exports — see scripts/verify-tarball.mjs for full rationale.
      # If this step fails, the publish does not happen.
      - name: Verify tarball — every subpath resolves (ESM + CJS + TS)
        run: pnpm verify:tarball --skip-build

      # Authentication: npm Trusted Publishing via OIDC.
      # Uses `npm publish` (not `pnpm publish`) because pnpm doesn't yet
      # implement npm's `/auth/oidc` token-exchange endpoint. `npm publish`
      # picks up the GitHub OIDC token via the `id-token: write` permission
      # above and the registry .npmrc that actions/setup-node wrote, then
      # exchanges it for a short-lived npm token. No NPM_TOKEN needed.
      #
      # Requires a registered trusted publisher at:
      #   https://www.npmjs.com/package/@tantainnovative/ndpr-toolkit/access
      #
      # `--provenance` adds the sigstore attestation.
      - name: Publish to npm (Trusted Publishing + provenance attestation)
        if: github.event_name == 'release'
        working-directory: .
        run: npm publish --access public --provenance

      # -----------------------------------------------------------------------
      # Companion packages — same Trusted Publishing (OIDC) mechanism, each from
      # its own subdirectory. They version INDEPENDENTLY of the main library, so
      # each step is idempotent: it publishes only when the package.json version
      # is not already on npm, and skips otherwise. That lets every main-library
      # release run this workflow without failing when a companion is unchanged.
      # These run on a `release`, or on a manual workflow_dispatch with
      # `publish_companions: true` — so you can ship a companion bump without
      # cutting a main-library release. The main-library publish above never
      # runs on dispatch.
      #
      # Each companion needs its OWN registered trusted publisher on npm, all
      # pointing at this workflow (.github/workflows/publish.yml in this repo):
      #   https://www.npmjs.com/package/@tantainnovative/create-ndpr/access
      #   https://www.npmjs.com/package/@tantainnovative/ndpr-recipes/access
      #   https://www.npmjs.com/package/create-ndpr/access
      #
      # The unscoped `create-ndpr` does not exist on npm yet — npm can only
      # configure a trusted publisher for a package that exists, so publish it
      # ONCE manually (npm login && npm publish from packages/create-ndpr-unscoped),
      # then add its trusted publisher so future bumps flow through here.
      # -----------------------------------------------------------------------

      - name: Publish @tantainnovative/create-ndpr (if version is new)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_companions)
        working-directory: packages/create-ndpr
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "@tantainnovative/create-ndpr@$VERSION" version >/dev/null 2>&1; then
            echo "@tantainnovative/create-ndpr@$VERSION already on npm — skipping"
          else
            echo "Publishing @tantainnovative/create-ndpr@$VERSION"
            npm publish --access public --provenance
          fi

      - name: Publish @tantainnovative/ndpr-recipes (if version is new)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_companions)
        working-directory: packages/ndpr-recipes
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "@tantainnovative/ndpr-recipes@$VERSION" version >/dev/null 2>&1; then
            echo "@tantainnovative/ndpr-recipes@$VERSION already on npm — skipping"
          else
            echo "Publishing @tantainnovative/ndpr-recipes@$VERSION"
            npm publish --access public --provenance
          fi

      - name: Publish create-ndpr unscoped alias (if version is new)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_companions)
        working-directory: packages/create-ndpr-unscoped
        # continue-on-error: until the unscoped `create-ndpr` is bootstrapped
        # (one manual publish) and given its own trusted publisher, this OIDC
        # publish has nothing to authenticate against and will fail. That must
        # not red-X the whole run after the scoped packages above succeeded.
        # Once it's at 1.0.0 on npm this step simply skips. Remove this line
        # after the trusted publisher is configured if you want hard failures.
        continue-on-error: true
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "create-ndpr@$VERSION" version >/dev/null 2>&1; then
            echo "create-ndpr@$VERSION already on npm — skipping"
          else
            echo "Publishing create-ndpr@$VERSION"
            npm publish --access public --provenance
          fi
